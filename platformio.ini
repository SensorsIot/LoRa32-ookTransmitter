; TTGO LoRa32 (SX1278, 433 MHz) - OOK awning controller + 433 MHz RX gateway
[env:ttgo-lora32]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino
monitor_speed = 115200
lib_ldf_mode = chain+
; Larger app partitions: the full rtl_433 OOK decoder set is big and the
; firmware keeps OTA (needs two app slots). min_spiffs = 2x ~1.9 MB app.
board_build.partitions = min_spiffs.csv
lib_deps =
    jgromes/RadioLib@^7.1.0
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
    tzapu/WiFiManager@^2.0.17
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0
    https://github.com/NorthernMan54/rtl_433_ESP.git
build_flags =
    ; --- rtl_433_ESP RX gateway: SX1278 on the T3 v1.6.1 wiring (FR-11) ---
    '-DRF_SX1278="SX1278"'
    '-DRF_MODULE_CS=18'
    '-DRF_MODULE_DIO0=26'
    '-DRF_MODULE_DIO1=33'
    '-DRF_MODULE_DIO2=32'      ; OOK DATA pin: RX input here, TX output for keying
    '-DRF_MODULE_RST=23'
    '-DRF_MODULE_SCK=5'
    '-DRF_MODULE_MISO=19'
    '-DRF_MODULE_MOSI=27'
    '-DOOK_MODULATION=true'    ; OOK receive (parity with the live HA sensors)
    '-DRF_MODULE_FREQUENCY=433.92'
    '-DLOG_LEVEL=LOG_LEVEL_WARNING'

; Default = local USB upload. To flash through the Universal Embedded Workbench
; (RFC2217), override the port on the CLI, e.g.:
;   pio run -t upload --upload-port 'rfc2217://<workbench-host>:4000?ign_set_control'
;   pio device monitor  --port  'rfc2217://<workbench-host>:4000?ign_set_control'

; --- Over-the-air upload (after first USB flash) ---
[env:ttgo-lora32-ota]
extends = env:ttgo-lora32
upload_protocol = espota
upload_port = 192.168.0.176
