; TTGO LoRa32 (SX1278, 433 MHz) - OOK awning controller
[env:ttgo-lora32]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.1.0
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    tzapu/WiFiManager@^2.0.17
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0

; Default = local USB upload. To flash through the Universal Embedded Workbench
; (RFC2217), override the port on the CLI, e.g.:
;   pio run -t upload --upload-port 'rfc2217://<workbench-host>:4000?ign_set_control'
;   pio device monitor  --port  'rfc2217://<workbench-host>:4000?ign_set_control'

; --- Over-the-air upload (after first USB flash) ---
; [env:ttgo-lora32-ota]
; extends = env:ttgo-lora32
; upload_protocol = espota
; upload_port = awning.local
