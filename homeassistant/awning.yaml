# Home Assistant awning automation + safety watchdog for the LoRa32 OOK awning controller.
#
# The device exposes a `cover` via MQTT discovery; HA drives it with cover.* services and
# publishes the liveness heartbeat the device watches on `awning/watchdog`.
#
# Fill in the placeholders for your entities:
#   sensor.<wind_speed>   — weather-station wind (same unit as the thresholds below)
#   sensor.<lux>          — light level
#   sensor.<temperature>  — outside temperature (°C)
#   cover.<awning>        — the discovered awning cover
#
# Load as a package: in configuration.yaml →  homeassistant: { packages: !include_dir_named packages }
# and place this file at packages/awning.yaml.

input_datetime:
  awning_last_move:
    name: Awning last move
    has_date: true
    has_time: true

automation:
  # 1) Liveness heartbeat every 30 s; payload carries the wind-safety verdict.
  #    The device retracts on 'unsafe' or on >120 s of silence.
  - id: awning_watchdog_heartbeat
    alias: "Awning: watchdog heartbeat"
    mode: single
    trigger:
      - platform: time_pattern
        seconds: "/30"
    action:
      - service: mqtt.publish
        data:
          topic: "awning/watchdog"
          qos: 0
          retain: false
          payload: >-
            {{ 'unsafe' if (states('sensor.<wind_speed>') | float(0) > 25) else 'ok' }}

  # 2) Emergency retract on high wind.
  - id: awning_emergency_wind
    alias: "Awning: emergency retract on wind"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.<wind_speed>
        above: 25
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.<awning>
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.awning_last_move
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # 3) Extend when sunny, warm and calm; at most once per 10 minutes.
  - id: awning_auto_extend
    alias: "Awning: auto extend"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: numeric_state
        entity_id: sensor.<lux>
        above: 3.0
      - condition: numeric_state
        entity_id: sensor.<temperature>
        above: 20
      - condition: numeric_state
        entity_id: sensor.<wind_speed>
        below: 20
      - condition: state
        entity_id: cover.<awning>
        state: "closed"
      - condition: template
        value_template: >-
          {{ (now() - states.input_datetime.awning_last_move.last_changed).total_seconds() > 600 }}
    action:
      - service: cover.open_cover
        target:
          entity_id: cover.<awning>
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.awning_last_move
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # 4) Retract when dark or cold; at most once per 10 minutes.
  - id: awning_auto_retract
    alias: "Awning: auto retract"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: or
        conditions:
          - condition: numeric_state
            entity_id: sensor.<lux>
            below: 1.0
          - condition: numeric_state
            entity_id: sensor.<temperature>
            below: 18
      - condition: not
        conditions:
          - condition: state
            entity_id: cover.<awning>
            state: "closed"
      - condition: template
        value_template: >-
          {{ (now() - states.input_datetime.awning_last_move.last_changed).total_seconds() > 600 }}
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.<awning>
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.awning_last_move
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
